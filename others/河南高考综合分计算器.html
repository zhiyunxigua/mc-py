<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南高考综合分计算器 - 西瓜</title>
    <style>
        :root {
            --primary-color: #C7EBC7;
            --bg-color: #ffffff;
            --text-color: #333333;
            --secondary-text: #666666;
            --border-color: #e0e0e0;
            --border-radius: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --accent-color: #2e7d32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--primary-color);
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background-color: var(--bg-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--secondary-text);
            font-size: 14px;
        }

        .card {
            background-color: var(--bg-color);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--accent-color);
        }

        .card-title .icon {
            margin-right: 10px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .input-box {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 15px;
            transition: all 0.2s;
            background-color: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: white;
        }

        .result-list {
            background-color: #f9f9f9;
            border-radius: var(--border-radius);
            padding: 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .result-item:hover {
            background-color: #f0f0f0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .formula-name {
            font-weight: 500;
            color: var(--text-color);
            font-size: 15px;
        }

        .result-value {
            font-weight: 600;
            font-size: 16px;
            color: var(--accent-color);
            min-width: 80px;
            text-align: right;
        }

        .placeholder {
            color: var(--secondary-text);
            font-weight: normal;
        }

        .info-text {
            color: var(--secondary-text);
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .highlight {
            color: var(--accent-color);
            font-weight: 500;
        }

        .copied-notice {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .show-notice {
            opacity: 1;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .card {
                padding: 15px;
            }

            .card-title {
                font-size: 16px;
                margin-bottom: 15px;
            }

            .formula-name {
                font-size: 14px;
            }

            .result-value {
                font-size: 15px;
            }

            input {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            .result-item {
                padding: 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .result-value {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>河南高考综合分计算器</h1>
            <p class="subtitle">作者：西瓜</p>
            <p class="subtitle">输入文化课和专业课分数，实时计算5种公式结果</p>
        </header>
        
        <div class="card">
            <div class="card-title">
                <span class="icon">📊</span>
                <span>分数计算</span>
            </div>
            
            <div class="input-group">
                <div class="input-box">
                    <label for="culture-score">文化课总分</label>
                    <input type="number" id="culture-score" min="0" max="750" placeholder="0-750分">
                </div>
                <div class="input-box">
                    <label for="art-score">专业课成绩</label>
                    <input type="number" id="art-score" min="0" max="300" placeholder="0-300分">
                </div>
            </div>
            
            <div class="result-list" id="results-container">
                <div class="result-item">
                    <span class="formula-name">文化总分</span>
                    <span class="result-value placeholder">-</span>
                </div>
                <div class="result-item">
                    <span class="formula-name">文化×0.8 + 专业×0.5</span>
                    <span class="result-value placeholder">-</span>
                </div>
                <div class="result-item">
                    <span class="formula-name">文化×0.7 + 专业×0.75</span>
                    <span class="result-value placeholder">-</span>
                </div>
                <div class="result-item">
                    <span class="formula-name">文化×0.6 + 专业×1</span>
                    <span class="result-value placeholder">-</span>
                </div>
                <div class="result-item">
                    <span class="formula-name">文化×0.5 + 专业×1.25</span>
                    <span class="result-value placeholder">-</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">
                <span class="icon">ℹ️</span>
                <span>说明</span>
            </div>
            <p class="info-text">
                河南省专业课录取采用5种综合分计算公式，院校可从中选择一种作为录取依据。
            </p>
            <p class="info-text">
                <span class="highlight">适用：</span> 美术与设计类、书法类、音乐类、舞蹈类、表（导）演类、播音与主持类。
            </p>
            <p class="info-text">
                <span class="highlight">不适用：</span> 戏曲类、使用校考成绩的专业。
            </p>
            <p class="info-text">
                <span class="highlight">注意：</span> 公式5为院校未说明时的默认计算方式。需同时达到专业统考合格线和文化课控制线才有投档资格。
            </p>
        </div>
    </div>

    <div class="copied-notice" id="copiedNotice">已复制到剪贴板</div>

    <script>
        // 计算公式数据
        const formulas = [
            { name: "文化总分", calc: (c, a) => c },
            { name: "文化×0.8 + 专业×0.5", calc: (c, a) => c * 0.8 + a * 0.5 },
            { name: "文化×0.7 + 专业×0.75", calc: (c, a) => c * 0.7 + a * 0.75 },
            { name: "文化×0.6 + 专业×1", calc: (c, a) => c * 0.6 + a * 1 },
            { name: "文化×0.5 + 专业×1.25", calc: (c, a) => c * 0.5 + a * 1.25 }
        ];
        
        // 获取DOM元素
        const cultureInput = document.getElementById('culture-score');
        const artInput = document.getElementById('art-score');
        const resultItems = document.querySelectorAll('.result-item');
        
        // 计算并更新结果
        function calculateResults() {
            const culture = parseFloat(cultureInput.value) || 0;
            const art = parseFloat(artInput.value) || 0;
            
            // 验证输入范围
            if (culture < 0 || culture > 750) {
                cultureInput.value = Math.min(Math.max(culture, 0), 750);
            }
            if (art < 0 || art > 300) {
                artInput.value = Math.min(Math.max(art, 0), 300);
            }
            
            // 更新每个结果项
            resultItems.forEach((item, index) => {
                const resultValue = item.querySelector('.result-value');
                const formula = formulas[index];
                
                if (culture === 0 && art === 0) {
                    resultValue.textContent = '-';
                    resultValue.className = 'result-value placeholder';
                } else {
                    const result = formula.calc(culture, art);
                    resultValue.textContent = result.toFixed(2);
                    resultValue.className = 'result-value';
                }
            });
        }
        
        // 添加输入事件监听
        cultureInput.addEventListener('input', calculateResults);
        artInput.addEventListener('input', calculateResults);
        
        // 添加示例数据复制功能
        function copyExampleData() {
            const exampleData = "文化课: 500分, 专业课: 240分";
            navigator.clipboard.writeText(exampleData).then(() => {
                showNotice();
            });
        }
        
        function showNotice() {
            const notice = document.getElementById('copiedNotice');
            notice.classList.add('show-notice');
            setTimeout(() => {
                notice.classList.remove('show-notice');
            }, 2000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 设置示例数据
            cultureInput.value = 500;
            artInput.value = 240;
            calculateResults();
        });
    </script>
</body>
</html>
